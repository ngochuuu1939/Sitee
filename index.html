<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Độ nhạy lửa chùa VIP - Ngochuu</title>

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        .container {

        .device-input-area {
            text-align: center;
            margin-bottom: 20px;

            background: #0f0f1f;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }
        .device-input-area input:focus {
            border-color: #ffd966;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        .device-input-area .btn-confirm {
            margin-top: 14px;
            padding: 12px 40px;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #ffe066, #f5b800);
            font-weight: 700;
            font-size: 18px;
            color: #0b0b14;
            cursor: pointer;
            box-shadow: 0 6px 20px #f5b80055;
            transition: 0.25s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .device-input-area .btn-confirm:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 28px #f5b80088;
        }

        .title-sub {

            margin: 0 auto 16px;
            border: 1px dashed #ffb347;
            letter-spacing: 1px;
        }
        .device-badge {

            color: #d4d4f0;

            align-items: center;
            background: rgba(12, 12, 30, 0.7);
            padding: 10px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            transition: 0.2s;
        }

            border-color: #ffd966;
            background: rgba(30, 30, 60, 0.8);
        }
